# Default board configuration template.
# Copy this to create a new board config.
# See common::BoardConfig for all supported fields.

# Board display name
name = ""

# CPU architecture: aarch64 | armv7l | riscv64 | x86_64
arch = "aarch64"

# SoC identifier (e.g. rk3566, bcm2711, jh7110)
soc = ""

# Physical RAM in megabytes
ram_mb = 2048

# Linux kernel version to build
kernel_version = "6.12"

# Kernel defconfig name (relative to arch/{arch}/configs/)
kernel_defconfig = ""

# U-Boot defconfig name
uboot_defconfig = ""

# Device tree blob path (relative to arch/{arch}/boot/dts/)
dtb = ""

# Ethernet interfaces (typically eth0=WAN, eth1=LAN)
eth_interfaces = ["eth0", "eth1"]

# evernight feature flags to enable on this board.
# Tier 1 (open standards) are always included. Tier 2 (vendor-specific)
# protocols like s7comm/mc/enip are opt-in — add them here to compile
# them into the gateway image. See docs for the full tier policy.
evernight_features = [
    "hardware",
    "protocol",
    "serial",
    "sensor",
    "bin",
    "api",
    "manifest",
]

# Entelecheia server WebSocket URL
entelecheia_server = ""

# USB composite gadget (USB-C port)
[usb_gadget]
# Enable the USB-C gadget at boot (mass-storage + NCM)
enabled = true
functions = ["mass_storage", "ncm"]
id_vendor = "0x1d6b"
id_product = "0x0104"
manufacturer = "celestia-island"
product = "Entelecheia Gateway"
mass_storage_file = "/usr/share/evernight-gadget/installer.img"
usb_net_ip = "10.0.99.1"
usb_net_cidr = 24
usb_net_dhcp_start = "10.0.99.100"
usb_net_dhcp_end = "10.0.99.200"

# Local HMI display (Chromebook-style: the gateway renders its own dashboard
# on an attached screen, not just serving a web page to a host browser).
#
# `engine` selects the browser engine used to render the HMI:
#   "webkitgtk" — WebKitGTK via Cogs/Epiphany (best prebuilt availability;
#                apt has arm64 packages. ~150-250MB RAM. Good CSS/JS compat.)
#   "servo"     — Servo engine (Rust, lightweight ~50-80MB RAM, but fewer
#                CSS/JS features; shittim-chest's Vue 3 + echarts may break).
#   "cef"       — Chromium Embedded Framework (best compat, ~300-400MB after
#                aggressive kiosk trimming, but NO prebuilt arm64 — must
#                self-compile, 6-12h build).
#   "none"      — headless gateway (HMI served to host browser only).
#
# Default is "none" (headless) for backward compatibility. Boards with a
# display set this in their own config (e.g. nanopi-r3s stays headless).
[display]
engine = "none"
# Resolution in pixels (ignored if engine = "none").
resolution = [1024, 768]
# The URL the kiosk browser loads on boot (the gateway's own dashboard).
kiosk_url = "http://127.0.0.1:8080/"
# Extra args passed to the browser engine (e.g. "--disable-gpu --single-process").
extra_args = ""
