[package]
name = "parley"
version = "0.10.0"
license = "Apache-2.0 OR MIT"
edition = "2021"
description = "parley — minimal text layout facade for aris. Re-exports fontique::SourceCache + fontique::Collection into a FontContext struct usable by blitz-dom."
readme = "README.md"
repository = "https://github.com/celestia-island/aris"
rust-version = "1.70"
keywords = ["text", "font", "layout"]
categories = ["text-processing", "graphics"]

# aris-fork: package name matches upstream (parley) so that [patch.crates-io]
# can resolve correctly. The lib name is the same anyway.
[lib]
name = "parley"
path = "src/lib.rs"

[features]
default = ["std", "system"]
std = ["fontique/std"]
system = ["fontique/system"]

[dependencies]
fontique = { path = "../fontique", version = "0.10.0", default-features = false }
linebender_resource_handle = { path = "../resource-handle", version = "0.1.1", default-features = false }

[lints.rust]
unsafe_code = "forbid"
