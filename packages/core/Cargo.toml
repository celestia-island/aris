[package]
name = "core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish = false
description = "aris-core — device firmware supervisor, runs on the gateway box"
license-file.workspace = true

[[bin]]
name = "aris-core"
path = "src/main.rs"

[dependencies]

anyhow.workspace = true
clap = { workspace = true, optional = true }
common.workspace = true
futures-util = { workspace = true, optional = true }
hex.workspace = true
reqwest = { workspace = true, optional = true }
serde.workspace = true
serde_json.workspace = true
# OTA subsystem
sha2.workspace = true
thiserror.workspace = true
tokio.workspace = true
toml.workspace = true
tracing-subscriber = { workspace = true, optional = true }
tracing.workspace = true
[dev-dependencies]

tempfile.workspace = true
[features]
default = ["cli"]
cli = ["dep:clap", "dep:tracing-subscriber"]
# Enable real HTTPS download support for OTA. Without this feature the
# OTA manager still compiles and the verify/write paths work, but
# check_update/download return an error.
http = ["dep:reqwest", "dep:futures-util"]
