[package]
name = "aris-js"
version = "0.1.0"
edition = "2024"
license = "BUSL-1.1"
description = "Boa JS engine integration for aris HMI"

[dependencies]
tracing = "0.1"
# Pin Boa to 0.20: aris pins rustc to 1.85 (rust-toolchain.toml), but Boa 0.21
# requires rustc 1.88. Boa 0.20 (Dec 2024) is the latest release that compiles
# on the 1.85 toolchain. The API surface we use (Context::default, Source,
# eval, JsValue::to_string) is identical between 0.20 and 0.21.
boa_engine = "=0.20.0"

[workspace]

