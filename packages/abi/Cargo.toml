[package]
name = "aris-abi"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
description = "Linux ABI compatibility layer for kei — syscall fallbacks, fbdev, DRM translation, proc/sys"

[dependencies]

anyhow.workspace = true
libc = "0.2"
memmap2 = "0.9"
thiserror.workspace = true
tracing.workspace = true
[features]
default = []
# Enable fbdev user-space driver
fbdev = []
# Enable DRM ioctl → fbdev translation
drm = ["fbdev"]
# Enable /proc and /sys simulation
procfs = []
