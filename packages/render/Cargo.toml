[[bin]]
name = "offline_history_test"
path = "src/bin/offline_history_test.rs"
required-features = ["winit", "js"]

[[bin]]
name = "offline_listener_test"
path = "src/bin/offline_listener_test.rs"
required-features = ["winit", "js"]

[[bin]]
name = "offline_onclick_test"
path = "src/bin/offline_onclick_test.rs"
required-features = ["winit", "js"]

[[bin]]
name = "offline_svg_test"
