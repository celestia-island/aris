[package]
name = "aris-render"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "HTML/CSS rendering pipeline for aris HMI — Blitz + Vello CPU + /dev/fb0"

[dependencies]
anyhow.workspace = true
thiserror.workspace = true
tracing.workspace = true
libc = "0.2"
memmap2 = "0.9"
blitz-dom = { version = "=0.3.0-alpha.6", default-features = false }
blitz-paint = { version = "=0.3.0-alpha.6", default-features = false }
blitz-traits = "=0.3.0-alpha.6"
blitz-html = "=0.3.0-alpha.6"
anyrender = "0.11"
anyrender_vello_cpu = "0.14"

# Boa JS engine (optional). Enabled by the `js` feature. Lets render_html
# execute <script> blocks before rendering, so JS-generated content
# (document.write, dynamic DOM) appears in the output.
aris-js = { path = "../js", optional = true }

# Desktop windowing (optional). Enabled by the `winit` feature. These deps
# pull in platform-specific backends (Win32/X11/Wayland/macOS) and must be
# excluded from the musl/kei cross-compile targets.
winit = { version = "0.30", optional = true }
softbuffer = { version = "0.4", optional = true }
raw-window-handle = { version = "0.6", optional = true }

[features]
default = []
fbdev = []
# Execute <script> blocks via Boa before rendering.
js = ["dep:aris-js"]
# Desktop window output via winit + softbuffer (Windows/Linux/macOS).
winit = ["dep:winit", "dep:softbuffer", "dep:raw-window-handle"]
