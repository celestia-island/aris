# aris — cargo configuration
#
# Uses Rust's self-contained musl linking with rust-lld (bundled cross-
# platform linker) so no system musl cross-toolchain is required.
#
# To use an external musl toolchain instead, rename this file and use
# config-cross.toml as a template.

[target.aarch64-unknown-linux-musl]
rustflags = ["-C", "linker-flavor=ld.lld", "-C", "linker=rust-lld", "-C", "link-self-contained=yes"]

[target.armv7-unknown-linux-musleabihf]
rustflags = ["-C", "linker-flavor=ld.lld", "-C", "linker=rust-lld", "-C", "link-self-contained=yes"]

[target.riscv64gc-unknown-linux-musl]
rustflags = ["-C", "linker-flavor=ld.lld", "-C", "linker=rust-lld", "-C", "link-self-contained=yes"]

[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "link-self-contained=yes"]
