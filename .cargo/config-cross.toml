# aris — cross-compilation configuration for aarch64-unknown-linux-musl
#
# musl static linking produces a single self-contained binary with no
# runtime libc dependency. This is the correct target for embedded gateway
# firmware — the same binary runs on Linux and Asterinas (Linux ABI compatible).
#
# Install the musl cross-toolchain:
#   Arch:   sudo pacman -S aarch64-linux-musl
#   Ubuntu: sudo apt install musl-tools gcc-aarch64-linux-gnu
#   Or:     download from https://musl.cc/

[target.aarch64-unknown-linux-musl]
linker = "aarch64-linux-musl-gcc"

[target.armv7-unknown-linux-musleabihf]
linker = "arm-linux-musleabihf-gcc"

[target.riscv64gc-unknown-linux-musl]
linker = "riscv64-linux-musl-gcc"

[target.x86_64-unknown-linux-musl]
linker = "musl-gcc"
